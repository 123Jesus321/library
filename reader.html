<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Чтение книги</title>
    <link rel="stylesheet" href="books.css">
</head>
<body class="reader-body">
    <main class="reader-page">
        <header class="reader-header">
            <div class="reader-header-row">
                <a class="back-btn" href="index.html">← К выбору книг</a>
                <button type="button" class="fullscreen-btn" id="reader-fullscreen-btn" title="На весь экран">
                    ⛶ Полный экран
                </button>
            </div>
            <div class="reader-book-meta">
                <p class="reader-label">Сейчас открыта книга</p>
                <h1 id="reader-title">Загрузка…</h1>
            </div>
            <div class="reader-rating-row" id="reader-rating-row" hidden>
                <span class="reader-rating-label">Ваша оценка:</span>
                <div class="star-rating" id="reader-star-rating" role="group" aria-label="Оценка книги"></div>
            </div>
        </header>

        <nav class="reader-series-bar" id="reader-series-bar" hidden aria-label="Книги серии"></nav>

        <section class="reader-frame-wrap" id="reader-frame-wrap">
            <button type="button" id="reader-pseudo-fs-close" class="pseudo-fs-close" hidden aria-label="Выйти из полного экрана">✕</button>
            <div id="pdf-view" class="pdf-view" hidden>
                <div class="pdf-viewport" id="pdf-viewport" role="region" aria-label="Страница книги">
                    <canvas id="pdf-canvas"></canvas>
                    <p id="pdf-error" class="pdf-error" hidden></p>
                </div>
                <nav class="pdf-toolbar" aria-label="Навигация по страницам">
                    <button type="button" class="pdf-nav-btn" id="pdf-prev" aria-label="Предыдущая страница">← Назад</button>
                    <span id="pdf-page-label" class="pdf-page-label">—</span>
                    <button type="button" class="pdf-nav-btn" id="pdf-next" aria-label="Следующая страница">Вперёд →</button>
                </nav>
            </div>
            <iframe
                id="reader-frame"
                class="reader-frame"
                src=""
                title="Документ книги"
                loading="lazy"
            ></iframe>
        </section>
    </main>

    <script src="books.js"></script>
</body>
</html>
