<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Чтение книги</title>
    <link rel="stylesheet" href="books.css">
</head>
<body class="reader-body" data-bg-theme="crimson-violet">
    <div class="bg-fx" id="bg-fx" aria-hidden="true">
        <div class="bg-fx-shimmer" id="bg-fx-shimmer"></div>
        <canvas class="bg-fx-canvas" id="bg-fx-canvas" width="300" height="150"></canvas>
    </div>

    <button type="button" class="settings-fab" id="settings-fab" aria-label="Настройки оформления" aria-expanded="false" aria-controls="settings-panel" title="Настройки">
        ⚙
    </button>
    <div class="settings-backdrop" id="settings-backdrop" hidden></div>
    <div class="settings-panel" id="settings-panel" role="dialog" aria-modal="true" aria-labelledby="settings-title" hidden>
        <div class="settings-panel-inner">
            <header class="settings-header">
                <h2 id="settings-title">Настройки</h2>
                <button type="button" class="settings-close" id="settings-close" aria-label="Закрыть">✕</button>
            </header>
            <div class="settings-body">
                <label class="settings-field">
                    <span class="settings-label">Тема фона</span>
                    <select id="settings-bg-theme" class="settings-select"></select>
                </label>
                <label class="settings-checkbox">
                    <input type="checkbox" id="settings-gradient-shimmer" checked>
                    <span>Переливание градиента (анимация фона)</span>
                </label>
                <fieldset class="settings-fieldset">
                    <legend class="settings-legend">Украшения на фоне</legend>
                    <label class="settings-radio"><input type="radio" name="settings-particle-mode" value="none" checked> <span>Выключено</span></label>
                    <label class="settings-radio"><input type="radio" name="settings-particle-mode" value="circles"> <span>Кружочки</span></label>
                    <label class="settings-radio"><input type="radio" name="settings-particle-mode" value="lines"> <span>Линии</span></label>
                    <label class="settings-radio"><input type="radio" name="settings-particle-mode" value="stars"> <span>Звёздочки</span></label>
                </fieldset>
                <div class="settings-field" id="settings-lines-count-wrap" hidden>
                    <div class="settings-label-row">
                        <span class="settings-label">Количество линий</span>
                        <span class="settings-speed-val" id="settings-particle-lines-val">7</span>
                    </div>
                    <input type="range" id="settings-particle-lines" class="settings-range" min="1" max="40" value="7" aria-label="Количество линий на фоне">
                </div>
                <div class="settings-field">
                    <div class="settings-label-row">
                        <span class="settings-label">Скорость движения</span>
                        <span class="settings-speed-val" id="settings-particle-speed-val">45</span>
                    </div>
                    <input type="range" id="settings-particle-speed" class="settings-range" min="5" max="100" value="45" aria-label="Скорость анимации украшений и перелива">
                </div>
                <p class="settings-hint">Настройки сохраняются в этом браузере.</p>
            </div>
        </div>
    </div>

    <main class="reader-page">
        <header class="reader-header">
            <div class="reader-header-row">
                <a class="back-btn" href="index.html">← К выбору книг</a>
                <button type="button" class="fullscreen-btn" id="reader-fullscreen-btn" title="На весь экран">
                    ⛶ Полный экран
                </button>
            </div>
            <div class="reader-book-meta">
                <p class="reader-label">Сейчас открыта книга</p>
                <h1 id="reader-title">Загрузка…</h1>
            </div>
            <div class="reader-rating-row" id="reader-rating-row" hidden>
                <span class="reader-rating-label">Ваша оценка:</span>
                <div class="star-rating" id="reader-star-rating" role="group" aria-label="Оценка книги"></div>
            </div>
        </header>

        <nav class="reader-series-bar" id="reader-series-bar" hidden aria-label="Книги серии"></nav>

        <section class="reader-frame-wrap" id="reader-frame-wrap">
            <button type="button" id="reader-pseudo-fs-close" class="pseudo-fs-close" hidden aria-label="Выйти из полного экрана">✕</button>
            <div id="pdf-view" class="pdf-view" hidden>
                <div class="pdf-viewport" id="pdf-viewport" role="region" aria-label="Страница книги">
                    <canvas id="pdf-canvas"></canvas>
                    <p id="pdf-error" class="pdf-error" hidden></p>
                </div>
                <nav class="pdf-toolbar" aria-label="Навигация по страницам">
                    <button type="button" class="pdf-nav-btn" id="pdf-prev" aria-label="Предыдущая страница">← Назад</button>
                    <span id="pdf-page-label" class="pdf-page-label">—</span>
                    <button type="button" class="pdf-nav-btn" id="pdf-next" aria-label="Следующая страница">Вперёд →</button>
                </nav>
            </div>
            <iframe
                id="reader-frame"
                class="reader-frame"
                src=""
                title="Документ книги"
                loading="lazy"
            ></iframe>
        </section>
    </main>

    <aside class="library-chat" id="library-chat" aria-label="Общий чат">
        <button type="button" class="library-chat-toggle" id="library-chat-toggle" aria-expanded="false" aria-controls="library-chat-panel">
            💬 Открыть чат
        </button>
        <div class="library-chat-panel" id="library-chat-panel" hidden>
            <div class="library-chat-head">
                <span class="library-chat-title">Сообщения видят все читатели</span>
            </div>
            <ul class="library-chat-messages" id="library-chat-messages"></ul>
            <form class="library-chat-form" id="library-chat-form" autocomplete="off">
                <input type="text" id="library-chat-nick" class="library-chat-nick" placeholder="Имя" maxlength="32" aria-label="Имя">
                <div class="library-chat-row">
                    <input type="text" id="library-chat-input" class="library-chat-input" placeholder="Сообщение…" maxlength="500" required aria-label="Текст сообщения">
                    <button type="submit" class="library-chat-send">Отправить</button>
                </div>
            </form>
            <p class="library-chat-status" id="library-chat-status" hidden></p>
        </div>
    </aside>

    <script src="chat-config.js"></script>
    <script src="chat.js"></script>
    <script src="books.js"></script>
    <script src="settings-ui.js"></script>
</body>
</html>
