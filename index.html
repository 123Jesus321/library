<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Библиотека PDF</title>
    <link rel="stylesheet" href="books.css">
</head>
<body>
    <div class="bg-theme-float" aria-label="Тема оформления">
        <label class="bg-theme-picker">
            <span class="bg-theme-label">Фон</span>
            <select id="bg-theme-select" class="bg-theme-select" title="Градиент фона страницы"></select>
        </label>
    </div>
    <main class="library-page">
        <section class="hero">
            <p class="hero-kicker">Электронная библиотека</p>
            <h1>Выберите книгу и начните чтение</h1>
            <p class="hero-subtitle">
                Фильтры по автору, названию, серии и дате обновления. На телефоне «Полный экран» разворачивает страницу без системного API (работает в Safari). Оценки хранятся в браузере.
            </p>
        </section>

        <section class="library-filters" aria-label="Фильтры каталога">
            <label class="filter-field">
                <span class="filter-label">Название</span>
                <input type="search" id="filter-q" class="filter-input" placeholder="Поиск по названию…" autocomplete="off">
            </label>
            <label class="filter-field">
                <span class="filter-label">Автор</span>
                <select id="filter-author" class="filter-select">
                    <option value="">Все авторы</option>
                </select>
            </label>
            <label class="filter-field">
                <span class="filter-label">Серия</span>
                <select id="filter-series" class="filter-select">
                    <option value="">Все книги</option>
                    <option value="__none__">Без серии</option>
                </select>
            </label>
            <label class="filter-field">
                <span class="filter-label">Сортировка</span>
                <select id="filter-sort" class="filter-select">
                    <option value="updated-desc">Дата обновления (новые сверху)</option>
                    <option value="updated-asc">Дата обновления (старые сверху)</option>
                    <option value="title-asc">Название А→Я</option>
                    <option value="title-desc">Название Я→А</option>
                    <option value="author-asc">Автор А→Я</option>
                </select>
            </label>
        </section>

        <p id="library-empty" class="library-empty" hidden>Ничего не найдено — измените фильтры.</p>
        <section id="book-grid" class="book-grid" aria-label="Список книг"></section>
    </main>

    <aside class="library-chat" id="library-chat" aria-label="Общий чат">
        <button type="button" class="library-chat-toggle" id="library-chat-toggle" aria-expanded="false" aria-controls="library-chat-panel">
            💬 Общий чат
        </button>
        <div class="library-chat-panel" id="library-chat-panel" hidden>
            <div class="library-chat-head">
                <span class="library-chat-title">Сообщения видят все читатели</span>
            </div>
            <ul class="library-chat-messages" id="library-chat-messages"></ul>
            <form class="library-chat-form" id="library-chat-form" autocomplete="off">
                <input type="text" id="library-chat-nick" class="library-chat-nick" placeholder="Имя" maxlength="32" aria-label="Имя">
                <div class="library-chat-row">
                    <input type="text" id="library-chat-input" class="library-chat-input" placeholder="Сообщение…" maxlength="500" required aria-label="Текст сообщения">
                    <button type="submit" class="library-chat-send">Отправить</button>
                </div>
            </form>
            <p class="library-chat-status" id="library-chat-status" hidden></p>
        </div>
    </aside>

    <script src="chat-config.js"></script>
    <script src="chat.js"></script>
    <script src="books.js"></script>
</body>
</html>
